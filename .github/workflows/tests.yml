name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      POLYGON_API_KEY: test_placeholder

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas "numpy<2.0" tqdm boto3 requests python-dotenv orjson pyarrow yfinance matplotlib seaborn pytest
          pip install pandas-ta

      - name: Run tests
        run: pytest --tb=short -q --ignore=tests/test_progress_tracking.py
